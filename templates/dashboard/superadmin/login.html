<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Admin — Fëgg Jaay</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: #0f172a; color: #e2e8f0; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .login-box { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 2rem; width: 100%; max-width: 380px; }
    .brand { text-align: center; margin-bottom: 1.5rem; }
    .brand h1 { font-size: 1.5rem; font-weight: 700; color: white; }
    .brand h1 span { color: #F59E0B; }
    .admin-badge { display: inline-block; background: #F59E0B; color: #0f172a; font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.6rem; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 0.4rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.82rem; color: #94a3b8; margin-bottom: 0.35rem; }
    .field input { width: 100%; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; border-radius: 6px; padding: 0.65rem 0.85rem; font-size: 0.95rem; }
    .field input:focus { outline: none; border-color: #F59E0B; }
    .btn-login { width: 100%; background: #F59E0B; color: #0f172a; border: none; border-radius: 6px; padding: 0.7rem; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 0.5rem; }
    .btn-login:hover { background: #D97706; }
    .erreur { background: #7f1d1d; color: #fca5a5; border: 1px solid #dc2626; border-radius: 6px; padding: 0.65rem 0.85rem; font-size: 0.88rem; margin-bottom: 1rem; }
    .merchant-link { text-align: center; margin-top: 1.2rem; font-size: 0.82rem; color: #475569; }
    .merchant-link a { color: #64748b; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="brand">
      <h1>Fëgg<span>Jaay</span></h1>
      <span class="admin-badge">Super Admin</span>
    </div>

    {% if erreur %}
    <div class="erreur">{{ erreur }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
      <div class="field">
        <label for="username">Identifiant</label>
        <input type="text" id="username" name="username" autofocus autocomplete="username">
      </div>
      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login">Se connecter</button>
    </form>

    <div class="merchant-link">
      <a href="{% url 'dashboard:login' %}">← Interface commerçant</a>
    </div>
  </div>
</body>
</html>
